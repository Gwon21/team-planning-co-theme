name: Deploy Shopify Theme

on:
  push:
    branches:
      - main
      - staging
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme

      - name: Deploy to Live (main)
        if: github.ref == 'refs/heads/main'
        run: shopify theme push --theme-id ${{ secrets.LIVE_THEME_ID }} --store ${{ secrets.SHOPIFY_STORE }} --password ${{ secrets.SHOPIFY_THEME_TOKEN }} --allow-live

      - name: Deploy to Staging
        if: github.ref == 'refs/heads/staging'
        run: shopify theme push --theme-id ${{ secrets.STAGING_THEME_ID }} --store ${{ secrets.SHOPIFY_STORE }} --password ${{ secrets.SHOPIFY_THEME_TOKEN }}

      - name: Deploy to Dev
        if: github.ref == 'refs/heads/dev'
        run: shopify theme push --theme-id ${{ secrets.DEV_THEME_ID }} --store ${{ secrets.SHOPIFY_STORE }} --password ${{ secrets.SHOPIFY_THEME_TOKEN }}